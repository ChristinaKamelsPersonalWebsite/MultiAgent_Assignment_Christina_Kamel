name: Build and Push Docker Image

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.SECRETKEY }}

      - name: Build Docker image
        run: docker build -t ghcr.io/christinakamelspersonalwebsite/multiagent_assignment_christina_kamel:latest .

      - name: Push Docker image
        run: docker push ghcr.io/christinakamelspersonalwebsite/multiagent_assignment_christina_kamel:latest

      - name: Done
        run: echo "Docker image built and pushed successfully!"